<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-Q5PXT07YCP"></script>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>ページが見つかりません — ToolBox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--black:#1d1d1f;--gray-700:#636366;--gray-500:#8e8e93;--gray-300:#d1d1d6;--gray-200:#e5e5ea;--gray-100:#f2f2f7;--white:#fff;--accent:#0071e3;--font:"Plus Jakarta Sans","Noto Sans JP",-apple-system,sans-serif}
    html{font-size:16px;-webkit-font-smoothing:antialiased}
    body{font-family:var(--font);color:var(--black);background:var(--gray-100);line-height:1.7;min-height:100vh;display:flex;flex-direction:column}
    a{color:inherit;text-decoration:none}

    /* Nav */
    .nav{background:rgba(255,255,255,0.85);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid rgba(0,0,0,0.05)}
    .nav__inner{display:flex;align-items:center;justify-content:space-between;height:52px;max-width:1100px;margin:0 auto;padding:0 24px}
    .nav__logo{font-size:1.2rem;font-weight:800;letter-spacing:-0.04em}
    .nav__logo span{color:var(--accent)}
    .nav__back{font-size:0.82rem;font-weight:500;color:var(--accent);display:flex;align-items:center;gap:4px}

    /* Main */
    .main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px}
    .error-card{text-align:center;max-width:480px}
    .error-code{font-size:clamp(5rem,15vw,8rem);font-weight:800;letter-spacing:-0.06em;color:var(--gray-200);line-height:1}
    .error-title{font-size:clamp(1.3rem,3vw,1.8rem);font-weight:800;letter-spacing:-0.03em;margin:16px 0 12px}
    .error-desc{font-size:0.95rem;color:var(--gray-700);line-height:1.8;margin-bottom:32px}
    .error-btn{display:inline-block;background:var(--accent);color:var(--white);font-size:0.92rem;font-weight:600;padding:14px 36px;border-radius:980px;transition:background 0.2s,transform 0.2s}
    .error-btn:hover{background:#005bb5;transform:translateY(-2px)}
    .error-links{margin-top:32px;display:flex;flex-wrap:wrap;justify-content:center;gap:12px}
    .error-links a{font-size:0.82rem;font-weight:500;color:var(--accent);padding:8px 16px;border:1.5px solid var(--gray-200);border-radius:980px;transition:border-color 0.2s,background 0.2s}
    .error-links a:hover{border-color:var(--accent);background:rgba(0,113,227,0.04)}

    /* Footer */
    .footer{text-align:center;padding:24px;font-size:0.72rem;color:var(--gray-500);border-top:1px solid var(--gray-200)}
    .footer a{color:var(--accent)}

    @media(max-width:640px){
      .main{padding:32px 16px}
      .error-links{flex-direction:column;align-items:center}
    }
  </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1964975138803092"
     crossorigin="anonymous"></script>
</head>
<body>

  <nav class="nav">
    <div class="nav__inner">
      <a href="/" class="nav__logo">Tool<span>Box</span></a>
      <a href="/" class="nav__back">&larr; ツール一覧</a>
    </div>
  </nav>

  <main class="main">
    <div class="error-card">
      <div class="error-code">404</div>
      <h1 class="error-title">ページが見つかりません</h1>
      <p class="error-desc">お探しのページは移動または削除された可能性があります。<br>URLをご確認いただくか、トップページからお探しのツールをご利用ください。</p>
      <a href="/" class="error-btn">トップページへ戻る</a>
      <div class="error-links">
        <a href="/tools/text-counter/">文字数カウント</a>
        <a href="/tools/image-compressor/">画像圧縮</a>
        <a href="/tools/qr-generator/">QRコード作成</a>
        <a href="/tools/password-generator/">パスワード生成</a>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>&copy; 2026 <a href="/">ToolBox</a>. All rights reserved.</p>
  </footer>

</body>
</html>
