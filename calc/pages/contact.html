<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ - CalcBox</title>
<meta name="description" content="CalcBoxへのお問い合わせはこちらから。計算ツールに関するご質問・ご要望・不具合報告などお気軽にご連絡ください。">
<link rel="canonical" href="https://example.com/pages/contact.html">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}:root{--black:#1d1d1f;--accent:#0071e3;--accent-hover:#0077ED;--gray-100:#f2f2f7;--gray-200:#e5e5ea;--gray-400:#aeaeb2;--gray-500:#8e8e93;--white:#fff;--radius:16px;--radius-sm:12px;--transition:0.3s cubic-bezier(0.25,0.1,0.25,1)}html{scroll-behavior:smooth}body{font-family:'Inter','Noto Sans JP',sans-serif;background:var(--gray-100);color:var(--black);line-height:1.7;-webkit-font-smoothing:antialiased}a{color:inherit;text-decoration:none}
.nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.72);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-bottom:1px solid rgba(0,0,0,0.06)}.nav-inner{max-width:1080px;margin:0 auto;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between}.nav-logo{font-weight:700;font-size:18px;letter-spacing:-0.3px;display:flex;align-items:center;gap:8px}.nav-logo svg{width:24px;height:24px;color:var(--accent)}.nav-links{display:flex;gap:28px;font-size:14px;font-weight:500;color:var(--gray-500)}.nav-links a:hover{color:var(--black)}
.page-container{max-width:640px;margin:0 auto;padding:48px 24px 60px}
.page-container .breadcrumb{font-size:13px;color:var(--gray-500);margin-bottom:24px}.breadcrumb a{color:var(--accent)}
.page-container h1{font-size:32px;font-weight:700;letter-spacing:-0.5px;margin-bottom:8px}
.page-container .sub{font-size:15px;color:var(--gray-500);margin-bottom:32px}
.content-card{background:var(--white);border-radius:var(--radius);border:1px solid var(--gray-200);padding:32px}
.form-group{margin-bottom:20px}.form-group label{display:block;font-size:14px;font-weight:500;margin-bottom:6px}
input[type="text"],input[type="email"],textarea,select{width:100%;padding:10px 14px;border:1px solid var(--gray-200);border-radius:var(--radius-sm);font-size:16px;font-family:inherit;background:var(--white);outline:none;transition:var(--transition)}input:focus,textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,113,227,0.1)}
textarea{min-height:160px;resize:vertical}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--accent);color:var(--white);padding:12px 32px;border:none;border-radius:980px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:var(--transition);width:100%}.btn:hover{background:var(--accent-hover)}
.note{font-size:13px;color:var(--gray-500);margin-top:20px;line-height:1.6}
.success-msg{display:none;text-align:center;padding:40px 20px}.success-msg.active{display:block}.success-msg svg{width:48px;height:48px;color:#34c759;margin-bottom:12px}.success-msg h2{font-size:20px;margin-bottom:8px}.success-msg p{color:var(--gray-500);font-size:14px}
.footer{background:var(--white);border-top:1px solid var(--gray-200);padding:32px 24px;text-align:center;margin-top:60px}.footer p{font-size:12px;color:var(--gray-400)}
.reveal{opacity:0;transform:translateY(20px);transition:opacity 0.6s ease,transform 0.6s ease}.reveal.visible{opacity:1;transform:translateY(0)}
@media(max-width:768px){.nav-links{display:none}.page-container h1{font-size:26px}.content-card{padding:24px}}
</style>
</head>
<body>
<nav class="nav"><div class="nav-inner"><a href="../index.html" class="nav-logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="10" y2="10"/><line x1="12" y1="10" x2="14" y2="10"/><line x1="8" y1="14" x2="10" y2="14"/><line x1="12" y1="14" x2="14" y2="14"/><line x1="8" y1="18" x2="14" y2="18"/></svg>CalcBox</a><div class="nav-links"><a href="../index.html#calcs">計算ツール</a><a href="about.html">CalcBoxとは</a></div></div></nav>

<div class="page-container">
  <div class="breadcrumb"><a href="../index.html">CalcBox</a> / お問い合わせ</div>
  <h1>お問い合わせ</h1>
  <p class="sub">計算ツールに関するご質問・ご要望・不具合報告などお気軽にご連絡ください。</p>

  <div class="content-card reveal">
    <form id="contactForm" onsubmit="submitForm(event)">
      <div class="form-group">
        <label for="name">お名前</label>
        <input type="text" id="name" required placeholder="山田 太郎">
      </div>
      <div class="form-group">
        <label for="email">メールアドレス</label>
        <input type="email" id="email" required placeholder="example@email.com">
      </div>
      <div class="form-group">
        <label for="category">お問い合わせ種別</label>
        <select id="category">
          <option value="question">計算ツールに関する質問</option>
          <option value="bug">不具合の報告</option>
          <option value="request">機能のリクエスト</option>
          <option value="other">その他</option>
        </select>
      </div>
      <div class="form-group">
        <label for="message">お問い合わせ内容</label>
        <textarea id="message" required placeholder="お問い合わせ内容をご記入ください"></textarea>
      </div>
      <button type="submit" class="btn">送信する</button>
      <p class="note">※ 通常2〜3営業日以内にご返信いたします。お急ぎの場合はその旨をお問い合わせ内容にご記載ください。</p>
    </form>
    <div class="success-msg" id="successMsg">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      <h2>送信が完了しました</h2>
      <p>お問い合わせありがとうございます。内容を確認の上、ご返信いたします。</p>
    </div>
  </div>
</div>

<footer class="footer"><p>&copy; 2026 CalcBox. All rights reserved. | <a href="privacy.html" style="color:var(--gray-400)">プライバシーポリシー</a> | <a href="terms.html" style="color:var(--gray-400)">利用規約</a></p></footer>

<script>
function submitForm(e){
  e.preventDefault();
  document.getElementById('contactForm').style.display='none';
  document.getElementById('successMsg').classList.add('active');
}
const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target)}})},{threshold:0.1});
document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
</script>
</body>
</html>
