<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ | チェックノート</title>
<meta name="description" content="CheckNote（チェックノート）へのお問い合わせページです。ご意見・ご要望・誤りのご指摘をお寄せください。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}:root{--black:#1d1d1f;--accent:#0071e3;--gray-100:#f2f2f7;--gray-200:#e5e5ea;--gray-300:#d1d1d6;--gray-400:#aeaeb2;--gray-500:#8e8e93;--white:#fff;--transition:0.25s cubic-bezier(0.4,0,0.2,1)}
body{font-family:'Inter','Noto Sans JP',sans-serif;color:var(--black);background:var(--gray-100);line-height:1.8;-webkit-font-smoothing:antialiased}a{color:inherit;text-decoration:none}
.nav{position:sticky;top:0;z-index:100;background:rgba(242,242,247,0.72);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--gray-200)}.nav-inner{max-width:800px;margin:0 auto;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between}.nav-logo{font-size:18px;font-weight:700}.nav-logo span{color:var(--accent)}.nav-back{font-size:14px;font-weight:500;color:var(--accent);display:inline-flex;align-items:center;gap:4px}.nav-back svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.content{max-width:800px;margin:0 auto;padding:48px 24px 80px}.content h1{font-size:28px;font-weight:700;margin-bottom:12px}.content>p{font-size:14px;color:var(--gray-500);margin-bottom:32px}
.form-group{margin-bottom:20px}.form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:6px}.form-group input,.form-group textarea,.form-group select{width:100%;padding:12px 16px;border:1px solid var(--gray-300);border-radius:10px;font-size:14px;font-family:inherit;background:var(--white);transition:border-color var(--transition);outline:none}.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--accent)}.form-group textarea{height:160px;resize:vertical}
.form-submit{background:var(--accent);color:var(--white);font-size:15px;font-weight:600;padding:14px 40px;border:none;border-radius:100px;cursor:pointer;transition:background var(--transition)}.form-submit:hover{background:#0077ED}
.footer{background:var(--white);border-top:1px solid var(--gray-200);padding:24px;text-align:center;font-size:12px;color:var(--gray-400)}.footer a{color:var(--gray-500);margin:0 12px}
@media(max-width:768px){.content{padding:32px 20px 60px}.content h1{font-size:24px}}
</style>
</head>
<body>
<nav class="nav"><div class="nav-inner"><a href="../index.html" class="nav-logo">Check<span>Note</span></a><a href="../index.html" class="nav-back"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>トップに戻る</a></div></nav>

<div class="content">
  <h1>お問い合わせ</h1>
  <p>CheckNoteに関するご意見・ご要望・掲載内容の誤りのご指摘など、お気軽にお寄せください。</p>

  <form action="#" method="post" onsubmit="alert('お問い合わせありがとうございます。（※実際の送信にはサーバー側の設定が必要です）');return false;">
    <div class="form-group">
      <label for="contact-type">お問い合わせ種別</label>
      <select id="contact-type" name="type" required>
        <option value="">選択してください</option>
        <option value="feedback">ご意見・ご感想</option>
        <option value="request">機能リクエスト・チェックリスト追加要望</option>
        <option value="error">掲載内容の誤り</option>
        <option value="ad">広告掲載について</option>
        <option value="other">その他</option>
      </select>
    </div>
    <div class="form-group">
      <label for="contact-name">お名前</label>
      <input type="text" id="contact-name" name="name" placeholder="山田 太郎" required>
    </div>
    <div class="form-group">
      <label for="contact-email">メールアドレス</label>
      <input type="email" id="contact-email" name="email" placeholder="example@email.com" required>
    </div>
    <div class="form-group">
      <label for="contact-message">お問い合わせ内容</label>
      <textarea id="contact-message" name="message" placeholder="お問い合わせ内容をご記入ください" required></textarea>
    </div>
    <button type="submit" class="form-submit">送信する</button>
  </form>
</div>

<footer class="footer"><div><a href="../index.html">トップ</a><a href="about.html">このサイトについて</a><a href="privacy.html">プライバシーポリシー</a><a href="terms.html">利用規約</a></div><p style="margin-top:12px">&copy; 2025 CheckNote</p></footer>
</body>
</html>
