  <link rel="stylesheet" href="css/style.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1964975138803092"
     crossorigin="anonymous"></script>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebApplication",
  "name": "お問い合わせ - KeiyakuMaker",
  "url": "https://muryo-tool.com/keiyaku/contact.html",
  "description": "KeiyakuMakerへのお問い合わせ。サービスに関するご質問やご要望をお寄せください。",
  "applicationCategory": "BusinessApplication",
  "operatingSystem": "Web",
  "offers": {"@type": "Offer", "price": "0", "priceCurrency": "JPY"},
  "inLanguage": "ja",
  "isPartOf": {"@type": "WebSite", "name": "契約書メーカー", "url": "https://muryo-tool.com/keiyaku/"}
}
</script>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo"><div class="logo-icon">K</div>KeiyakuMaker</a>
      <nav class="nav" id="nav">
        <a href="index.html">ホーム</a>
        <a href="index.html#pricing">料金</a>
        <a href="about.html">運営者情報</a>
        <a href="app.html" class="nav-cta">無料で始める</a>
      </nav>
      <button class="menu-toggle" id="menuToggle" aria-label="メニュー"><span></span><span></span><span></span></button>
    </div>
  </header>

  <section class="page-header">
    <div class="container">
      <h1>お問い合わせ</h1>
      <p>ご質問やご要望がございましたら、お気軽にお問い合わせください。</p>
    </div>
  </section>

  <div class="page-content">
    <div class="contact-form">
      <form id="contactForm" action="https://formspree.io/f/2525nxrei@gmail.com" method="POST">
        <div class="form-group">
          <label class="form-label">お名前<span class="required">*</span></label>
          <input type="text" class="form-input" name="name" placeholder="例：山田 太郎" required>
        </div>
        <div class="form-group">
          <label class="form-label">メールアドレス<span class="required">*</span></label>
          <input type="email" class="form-input" name="email" placeholder="例：yamada@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">お問い合わせ種別<span class="required">*</span></label>
          <select class="form-select" name="category" required>
            <option value="">選択してください</option>
            <option value="general">サービスに関するご質問</option>
            <option value="billing">料金・決済に関するご質問</option>
            <option value="template">テンプレートに関するご要望</option>
            <option value="bug">不具合のご報告</option>
            <option value="partnership">提携・協業のご相談</option>
            <option value="other">その他</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">件名<span class="required">*</span></label>
          <input type="text" class="form-input" name="subject" placeholder="お問い合わせの件名" required>
        </div>
        <div class="form-group">
          <label class="form-label">お問い合わせ内容<span class="required">*</span></label>
          <textarea class="form-textarea" name="message" placeholder="お問い合わせ内容を入力してください" required style="min-height: 180px;"></textarea>
        </div>
        <div class="form-group">
          <label style="display: flex; align-items: flex-start; gap: 10px; cursor: pointer; font-size: 0.85rem; color: var(--color-secondary);">
            <input type="checkbox" name="agree" required style="margin-top: 3px;">
            <span><a href="privacy.html" target="_blank">プライバシーポリシー</a>に同意の上、送信します。</span>
          </label>
        </div>
        <button type="submit" class="btn btn-primary btn-lg">送信する</button>
      </form>

      <div id="contactSuccess" style="display: none; text-align: center; padding: 60px 20px;">
        <div style="font-size: 48px; margin-bottom: 16px;">&#10003;</div>
        <h3 style="margin-bottom: 12px;">送信完了</h3>
        <p style="color: var(--color-secondary);">お問い合わせいただきありがとうございます。<br>2営業日以内にご連絡いたします。</p>
      </div>
    </div>

    <div style="margin-top: 60px; padding: 32px; background: var(--color-bg-alt); border-radius: var(--radius-lg);">
      <h3 style="margin-bottom: 12px; font-size: 1.1rem;">その他のお問い合わせ方法</h3>
      <p style="font-size: 0.92rem;">メール：2525nxrei@gmail.com</p>
      <p style="font-size: 0.85rem; color: var(--color-secondary); margin-top: 8px;">営業時間：平日 10:00〜18:00（土日祝日を除く）<br>通常2営業日以内にご返信いたします。</p>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="border-top: none; padding-top: 0;">
        <p>&copy; 2025 KeiyakuMaker. All rights reserved.</p>
        <div class="footer-bottom-links">
          <a href="privacy.html">プライバシーポリシー</a>
          <a href="terms.html">利用規約</a>
          <a href="tokushoho.html">特定商取引法に基づく表記</a>
        </div>
      </div>
    </div>
  </footer>

  <script>
    document.getElementById('menuToggle').addEventListener('click', function() {
      document.getElementById('nav').classList.toggle('active');
    });

    document.getElementById('contactForm').addEventListener('submit', function(e) {
      e.preventDefault();
      // In production, this would send to a backend API or service like Formspree
      this.style.display = 'none';
      document.getElementById('contactSuccess').style.display = 'block';
    });
  </script>
</body>
</html>
