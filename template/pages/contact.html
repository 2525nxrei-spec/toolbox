<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ｜テンプレBOX</title>
<meta name="description" content="テンプレBOXへのお問い合わせはこちらから。テンプレートに関するご質問やご要望をお待ちしております。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--black:#1d1d1f;--accent:#0071e3;--gray-100:#f2f2f7;--gray-200:#e5e5ea;--gray-400:#aeaeb2;--gray-500:#8e8e93;--gray-600:#636366;--white:#fff;--radius:12px;--nav-height:64px}
html{scroll-behavior:smooth}
body{font-family:'Inter','Noto Sans JP',sans-serif;color:var(--black);background:var(--gray-100);line-height:1.8;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
.nav{position:sticky;top:0;z-index:100;background:rgba(242,242,247,0.72);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--gray-200);height:var(--nav-height)}
.nav-inner{max-width:1080px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:100%}
.nav-logo{font-size:20px;font-weight:700}.nav-logo span{color:var(--accent)}
.nav-links{display:flex;gap:28px}.nav-links a{font-size:14px;font-weight:500;color:var(--gray-600);transition:color .2s}.nav-links a:hover{color:var(--black)}
.page-content{max-width:640px;margin:0 auto;padding:80px 24px}
.page-content h1{font-size:32px;font-weight:700;margin-bottom:12px;letter-spacing:-0.02em}
.page-content .lead{font-size:17px;color:var(--gray-600);margin-bottom:48px}
.form-group{margin-bottom:24px}
.form-group label{display:block;font-size:14px;font-weight:600;margin-bottom:8px}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:12px 16px;border:1px solid var(--gray-200);border-radius:8px;font-size:15px;font-family:inherit;background:var(--white);transition:border-color .2s;outline:none}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--accent)}
.form-group textarea{min-height:160px;resize:vertical}
.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;border-radius:8px;font-size:15px;font-weight:600;font-family:inherit;border:none;cursor:pointer;background:var(--accent);color:var(--white);transition:background .2s}
.btn:hover{background:#0077ED}
.note{font-size:13px;color:var(--gray-500);margin-top:16px;line-height:1.7}
.footer{background:var(--white);border-top:1px solid var(--gray-200);padding:32px 24px;text-align:center;font-size:13px;color:var(--gray-400);margin-top:80px}
@media(max-width:768px){.nav-links{display:none}.page-content h1{font-size:26px}.page-content{padding:48px 16px}}
</style>
</head>
<body>
<nav class="nav"><div class="nav-inner"><a href="../index.html" class="nav-logo">テンプレ<span>BOX</span></a><div class="nav-links"><a href="../index.html">ホーム</a><a href="about.html">このサイトについて</a><a href="privacy.html">プライバシーポリシー</a></div></div></nav>

<div class="page-content">
<h1>お問い合わせ</h1>
<p class="lead">テンプレートに関するご質問やご要望がございましたら、以下のフォームよりご連絡ください。</p>

<form onsubmit="event.preventDefault();alert('お問い合わせありがとうございます。内容を確認の上、ご連絡いたします。');this.reset();">
<div class="form-group">
<label for="name">お名前</label>
<input type="text" id="name" name="name" required placeholder="山田 太郎">
</div>
<div class="form-group">
<label for="email">メールアドレス</label>
<input type="email" id="email" name="email" required placeholder="example@email.com">
</div>
<div class="form-group">
<label for="category">お問い合わせ種別</label>
<select id="category" name="category">
<option value="question">テンプレートに関するご質問</option>
<option value="request">新しいテンプレートのリクエスト</option>
<option value="bug">不具合のご報告</option>
<option value="other">その他</option>
</select>
</div>
<div class="form-group">
<label for="message">お問い合わせ内容</label>
<textarea id="message" name="message" required placeholder="お問い合わせ内容をご記入ください"></textarea>
</div>
<button type="submit" class="btn">送信する</button>
<p class="note">※ お問い合わせへの回答には、2〜3営業日いただく場合がございます。<br>※ いただいた個人情報は、お問い合わせへの対応のみに使用いたします。</p>
</form>
</div>

<footer class="footer">&copy; 2025 テンプレBOX. All rights reserved.</footer>
</body>
</html>
